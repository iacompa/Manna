name: CI smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_ENABLE_BYOK: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm typecheck
      - name: BYOK store leak scan (flag off)
        run: node tooling/byok/scan-store-byok-leak.mjs
      - name: BYOK scan unit tests
        run: node --test tooling/byok/scan-store-byok-leak.test.mjs
